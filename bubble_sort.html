<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法視覺化</title>
    <style>
        :root {
            --primary-color: #3498db;
            --compare-color: #e74c3c;
            --sorted-color: #2ecc71;
            --default-color: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #2c3e50; }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        /* 數值棒條樣式 */
        .array-container {
            display: flex;
            align-items: bottom;
            justify-content: center;
            height: 300px;
            margin: 20px 0;
            gap: 5px;
            border-bottom: 2px solid #333;
        }

        .bar {
            width: 40px;
            background-color: var(--primary-color);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            border-radius: 4px 4px 0 0;
        }

        /* 控制按鈕 */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .info {
            margin-top: 20px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 5px;
            min-height: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bubble Sort 視覺化</h1>
    
    <div class="array-container" id="arrayContainer"></div>

    <div class="info" id="status">點擊「開始排序」觀察過程</div>

    <div class="controls">
        <button onclick="resetArray()">隨機重排</button>
        <button id="startBtn" onclick="bubbleSort()">開始自動排序</button>
        <button id="stepBtn" onclick="nextStep()">下一步</button>
    </div>
</div>

<script>
    const container = document.getElementById('arrayContainer');
    const statusText = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stepBtn = document.getElementById('stepBtn');
    
    let array = [];
    let steps = [];
    let currentStep = 0;
    let isSorting = false;

    // 初始化陣列
    function resetArray() {
        array = [];
        container.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            array.push(Math.floor(Math.random() * 90) + 10);
        }
        renderArray();
        generateSteps();
        currentStep = 0;
        statusText.innerText = "陣列已重置，準備就緒。";
        toggleButtons(false);
    }

    // 渲染陣列到畫面
    function renderArray(highlightIndices = [], sortedIndices = []) {
        container.innerHTML = '';
        array.forEach((value, index) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${value * 3}px`;
            bar.innerText = value;
            
            if (highlightIndices.includes(index)) {
                bar.style.backgroundColor = 'var(--compare-color)';
            } else if (sortedIndices.includes(index)) {
                bar.style.backgroundColor = 'var(--sorted-color)';
            }
            
            container.appendChild(bar);
        });
    }

    // 事先計算所有排序步驟 (為了能「下一步」操作)
    function generateSteps() {
        steps = [];
        let tempArray = [...array];
        let n = tempArray.length;
        let sortedIndices = [];

        for (let i = 0; i < n - 1; i++) {
            for (let j = 0; j < n - i - 1; j++) {
                // 紀錄比較狀態
                steps.push({
                    arr: [...tempArray],
                    highlights: [j, j + 1],
                    sorted: [...sortedIndices],
                    msg: `比較 ${tempArray[j]} 與 ${tempArray[j+1]}`
                });

                if (tempArray[j] > tempArray[j + 1]) {
                    [tempArray[j], tempArray[j + 1]] = [tempArray[j + 1], tempArray[j]];
                    // 紀錄交換後狀態
                    steps.push({
                        arr: [...tempArray],
                        highlights: [j, j + 1],
                        sorted: [...sortedIndices],
                        msg: `交換 ${tempArray[j+1]} 與 ${tempArray[j]}`
                    });
                }
            }
            sortedIndices.push(n - i - 1);
        }
        sortedIndices.push(0);
        steps.push({
            arr: [...tempArray],
            highlights: [],
            sorted: [...sortedIndices],
            msg: "排序完成！"
        });
    }

    // 執行下一步
    function nextStep() {
        if (currentStep < steps.length) {
            const step = steps[currentStep];
            array = step.arr;
            renderArray(step.highlights, step.sorted);
            statusText.innerText = step.msg;
            currentStep++;
        } else {
            toggleButtons(true);
        }
    }

    // 自動執行
    async function bubbleSort() {
        if (isSorting) return;
        isSorting = true;
        toggleButtons(true);

        while (currentStep < steps.length) {
            nextStep();
            await new Promise(resolve => setTimeout(resolve, 400));
        }

        isSorting = false;
    }

    function toggleButtons(disabled) {
        startBtn.disabled = disabled;
        stepBtn.disabled = disabled;
    }

    // 初始啟動
    resetArray();
</script>

</body>
</html>
